<!doctype html>
<html lang="en" class="loading">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cat Nip</title>
		<link rel="stylesheet" href="views://mainview/index.css" />
	</head>
	<body>
		<div class="panel">
			<header class="drag">
				<span class="dot"></span>
				<h1 class="title">Cat Nip</h1>
				<span class="ver">v0.0.1</span>
				<button class="btn collapse-btn no-drag" id="toggleBtn" title="Collapse"></button>
			</header>
			<div class="body">
				<div class="meter">
					<div class="bar" id="meterBar"></div>
				</div>
				<div class="row pack-row">
					<span class="label">pack</span>
					<select id="packSelect" class="select"></select>
					<button class="btn no-drag" id="nextBtn" title="Next pack">⏭</button>
					<button class="btn no-drag" id="importBtn" title="Import .viz pack">+</button>
				</div>
				<div class="row auto-row">
					<span class="label">auto</span>
					<label class="check-inline no-drag">
						<input type="checkbox" id="autoChk" />
						<span>every</span>
					</label>
					<input type="number" id="autoSec" class="num" min="5" max="600" step="5" value="30" />
					<span class="value muted">s</span>
					<label class="check-inline no-drag">
						<input type="checkbox" id="shuffleChk" />
						<span>shuffle</span>
					</label>
				</div>
			<div class="row">
				<span class="label">audio</span>
				<select id="audioSourceSelect" class="select select-sm no-drag" title="Audio source">
					<option value="system">system</option>
					<option value="mic">mic</option>
				</select>
				<span class="value muted" id="audioStatus">capture not implemented yet</span>
				<button class="btn no-drag" id="permFixBtn" title="Open Screen Recording settings" hidden>fix</button>
			</div>
				<section id="paramsPanel" class="params-panel" hidden></section>
				<div id="errorBanner" class="error-banner" hidden></div>
			</div>
		</div>
		<script type="module" src="views://mainview/index.js"></script>
	</body>
</html>
