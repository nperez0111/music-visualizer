name: build

# Builds macOS application bundle for ARM64 (Apple Silicon).
# Intel Macs can run the ARM64 build via Rosetta 2.
# Produces .app/.dmg artifacts via `electrobun build`.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "tests/snapshots/**"

jobs:
  build:
    name: Build macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/native/audiocap/target
          key: cargo-arm64-${{ hashFiles('src/native/audiocap/Cargo.lock') }}
          restore-keys: cargo-arm64-

      - name: Build audiocap (native arch)
        run: |
          cd src/native/audiocap
          cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/audiocap audiocap

      - name: bun install
        run: bun install --frozen-lockfile

      - name: Build Tier 2 (WASM) packs
        run: bun run build:packs

      - name: Build app (canary)
        run: bunx electrobun build --env=canary

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cat-nip-macos-arm64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error
