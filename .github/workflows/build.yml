name: build

# Builds macOS application bundles for ARM64 (Apple Silicon) and x64 (Intel).
# Produces .app/.dmg artifacts via `electrobun build`.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "tests/snapshots/**"

jobs:
  build:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest          # Apple Silicon
            rust-target: aarch64-apple-darwin
          - arch: x64
            runner: macos-13              # Intel
            rust-target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/native/audiocap/target
          key: cargo-${{ matrix.arch }}-${{ hashFiles('src/native/audiocap/Cargo.lock') }}
          restore-keys: cargo-${{ matrix.arch }}-

      - name: Build audiocap (native arch)
        run: |
          cd src/native/audiocap
          cargo build --release --target ${{ matrix.rust-target }}
          cp target/${{ matrix.rust-target }}/release/audiocap audiocap

      - name: bun install
        run: bun install --frozen-lockfile

      - name: Build Tier 2 (WASM) packs
        run: bun run build:packs

      - name: Build app (canary)
        run: bunx electrobun build --env=canary

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: music-visualizer-macos-${{ matrix.arch }}
          path: artifacts/
          retention-days: 30
          if-no-files-found: error
