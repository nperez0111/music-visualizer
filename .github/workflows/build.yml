name: build

# Builds macOS application bundle for ARM64 (Apple Silicon).
# Intel Macs can run the ARM64 build via Rosetta 2.
# Produces .app/.dmg artifacts via `electrobun build`.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "tests/snapshots/**"

jobs:
  build:
    name: Build macOS (arm64)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/native/audiocap/target
          key: cargo-arm64-${{ hashFiles('src/native/audiocap/Cargo.lock') }}
          restore-keys: cargo-arm64-

      - name: Build audiocap (native arch)
        run: |
          cd src/native/audiocap
          cargo build --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/audiocap audiocap

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          security default-keychain -s build.keychain
          security list-keychains -s build.keychain
          rm certificate.p12

      - name: Sign audiocap binary
        env:
          DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
        run: |
          codesign --sign "Developer ID Application: $DEVELOPER_ID" \
            --options runtime \
            --timestamp \
            --force \
            src/native/audiocap/audiocap

      - name: bun install
        run: bun install --frozen-lockfile

      - name: Build Tier 2 (WASM) packs
        run: bun run build:packs

      - name: Build app (canary)
        env:
          ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
          ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
          ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
          ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}
        run: bunx electrobun build --env=canary

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cat-nip-macos-arm64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error
