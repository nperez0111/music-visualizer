name: naga-image

# Builds and publishes a multi-arch OCI image containing only the naga-cli
# binary (GLSL→WGSL transpiler). Other Dockerfiles reference this image via
# COPY --from= to avoid compiling Rust from source on every build.
#
# Triggers:
#   - Weekly cron (Sundays 06:00 UTC) to pick up base-image security patches
#   - Manual dispatch to bump the naga-cli version

on:
  schedule:
    - cron: "0 6 * * 0"  # Every Sunday at 06:00 UTC
  workflow_dispatch:
    inputs:
      naga_version:
        description: "naga-cli version to install (e.g. 29.0.0)"
        required: false
        default: "29.0.0"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push naga image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      IMAGE: ghcr.io/${{ github.repository }}-naga
      # inputs.naga_version is empty on schedule triggers; fall back to hardcoded default.
      NAGA_VERSION: ${{ inputs.naga_version || '29.0.0' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.naga
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NAGA_VERSION=${{ env.NAGA_VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.NAGA_VERSION }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=naga
          cache-to: type=gha,mode=max,scope=naga
