name: render-packs

# Headlessly renders every visualizer pack to a PNG using Mesa lavapipe
# (CPU Vulkan) inside the published Docker image, asserts the output isn't
# trivially empty, and uploads the gallery as a workflow artifact you can
# browse from the run page. Pure software rendering — no GPU passthrough.
#
# The Docker image pre-bakes: Mesa lavapipe, GTK/WebKit, GCC, naga,
# electrobun native libs, the wgpu ABI shim, and the version.json shim.
# The only source-dependent steps are: checkout, bun install, build:packs,
# and the actual render test.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

jobs:
  render:
    name: Render every pack to PNG (Linux / lavapipe)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # All system deps + electrobun native libs live in the image.
    # Source is checked out into the container by actions/checkout.
    container:
      image: ghcr.io/nperez0111/cat-nip:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: bun install
        run: bun install --frozen-lockfile

      - name: Build Tier 2 (WASM) pack artifacts
        # Tier 2 packs ship `pack.ts` but the compiled `pack.wasm` is gitignored
        # (`build-packs.ts` produces it via AssemblyScript). Without this step
        # those packs fall back to Tier 1 and render uniform-color frames,
        # tripping the render-test's IDAT-size assertion.
        run: bun run build:packs

      - name: Render every pack
        # The Docker image sets VIZ_BUNDLE_NATIVE_DIR=/opt/electrobun and
        # LD_LIBRARY_PATH=/opt/electrobun, so the test finds the pre-built
        # native libs (bun, libwebgpu_dawn.so, libheadlessshim.so) there.
        # We use /opt/electrobun/bun as the test runner so the dynamic loader
        # resolves dlopen'd .so files via that binary's RUNPATH.
        env:
          VIZ_PACKS_RENDER_TEST: "1"
        run: /opt/electrobun/bun test src/packs/render.test.ts

      - name: Upload pack snapshots
        # Always upload, even on test failure — a failed pack with a corrupt
        # PNG is exactly the kind of thing reviewers will want to look at.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pack-snapshots
          path: |
            tests/snapshots/packs/*.png
            tests/snapshots/packs/*.webp
          retention-days: 14
          if-no-files-found: warn

  deploy-gallery:
    name: Build & deploy pack gallery to GitHub Pages
    needs: render
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - run: bun install --frozen-lockfile

      - name: Download rendered pack snapshots
        uses: actions/download-artifact@v4
        with:
          name: pack-snapshots
          path: tests/snapshots/packs

      - name: Build gallery site
        run: bun run build:gallery

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
