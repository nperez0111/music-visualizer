name: render-packs

# Headlessly renders every visualizer pack to a PNG using Mesa lavapipe
# (CPU Vulkan) inside the published Docker image, asserts the output isn't
# trivially empty, and uploads the gallery as a workflow artifact you can
# browse from the run page. Pure software rendering — no GPU passthrough.
#
# The Docker image pre-bakes: Mesa lavapipe, libwebgpu_dawn.so,
# libheadlessshim.so (with buffer readback), naga, and the version.json shim.
# GTK/WebKit is NOT needed — the extended headless shim replaces
# libNativeWrapper.so for headless rendering.
# The only source-dependent steps are: checkout, bun install, build:packs,
# and the actual render test.

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  render:
    name: Render every pack to PNG (Linux / lavapipe)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # All system deps + electrobun native libs live in the image.
    # Source is checked out into the container by actions/checkout.
    container:
      image: ghcr.io/nperez0111/cat-nip:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: bun install
        run: bun install --frozen-lockfile

      - name: Build Tier 2 (WASM) pack artifacts
        # Tier 2 packs ship `pack.ts` but the compiled `pack.wasm` is gitignored
        # (`build-packs.ts` produces it via AssemblyScript). Without this step
        # those packs fall back to Tier 1 and render uniform-color frames,
        # tripping the render-test's IDAT-size assertion.
        run: bun run build:packs

      - name: Render every pack
        # The Docker image sets VIZ_BUNDLE_NATIVE_DIR=/opt/electrobun and
        # LD_LIBRARY_PATH=/opt/electrobun, so the test finds the pre-built
        # native libs (libwebgpu_dawn.so, libheadlessshim.so) there.
        # System bun works because electrobun-gpu.ts falls back to loading
        # readback symbols from libheadlessshim.so when libNativeWrapper.so
        # is unavailable.
        env:
          VIZ_PACKS_RENDER_TEST: "1"
        run: cd packages/app && bun test src/packs/render.test.ts

      - name: Upload pack snapshots
        # Always upload, even on test failure — a failed pack with a corrupt
        # PNG is exactly the kind of thing reviewers will want to look at.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pack-snapshots
          path: |
            packages/app/tests/snapshots/packs/*.png
            packages/app/tests/snapshots/packs/*.webp
          retention-days: 14
          if-no-files-found: warn

