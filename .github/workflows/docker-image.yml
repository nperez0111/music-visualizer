name: docker-image

# Builds and publishes the headless render environment to GHCR.
# The render-packs workflow uses this image as its `container:`.
#
# Triggers:
#   - Push to main that touches the Dockerfile, this workflow, or files
#     that are COPY'd into the image (package.json, bun.lock, etc.)
#   - Weekly cron (Sundays 07:00 UTC) to pick up base-image security patches
#   - Manual dispatch

on:
  schedule:
    - cron: "0 7 * * 0"  # Every Sunday at 07:00 UTC (1h after naga-image)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/docker-image.yml
      - package.json
      - bun.lock
      - packages/app/electrobun.config.ts
      - packages/app/scripts/headless-shim.c

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push headless render image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
