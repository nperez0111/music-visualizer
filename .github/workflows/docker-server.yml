name: docker-server

# Builds and publishes the Cat Nip registry server image to GHCR.
#
# Cross-compiles for linux/amd64 and linux/arm64.
# Signs the image with cosign and attests build provenance.
#
# Triggers:
#   - Push to main that touches server-related files
#   - Tags matching v*.*.*
#   - Pull requests that touch server-related files (build only, no push)
#   - Manual dispatch

on:
  workflow_dispatch:
  push:
    branches: [main, server-docker]
    tags: ["v*.*.*"]
    paths:
      - Dockerfile.server
      - .dockerignore
      - .github/workflows/docker-server.yml
      - packages/server/**
      - packages/shared/**
      - packages/lexicons/**
      - package.json
      - bun.lock
  pull_request:
    paths:
      - Dockerfile.server
      - .dockerignore
      - .github/workflows/docker-server.yml
      - packages/server/**
      - packages/shared/**
      - packages/lexicons/**
      - package.json
      - bun.lock

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE: ghcr.io/${{ github.repository }}-server

jobs:
  build-and-push:
    name: Build & push server image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Deploy via Portainer webhook
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
