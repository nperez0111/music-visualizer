<!doctype html>
<html lang="en" class="loading">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cat Nip</title>
		<link rel="stylesheet" href="views://mainview/index.css" />
	</head>
	<body>
		<div class="app">
			<electrobun-wgpu class="visualizer" masks=".sidebar,#sidebarTab,#contextMenu,#confirmOverlay,#browseOverlay"></electrobun-wgpu>
			<button id="sidebarTab" title="Show controls">&#x2699;</button>
			<aside class="sidebar" id="sidebar">
				<header>
					<span class="dot"></span>
					<h1 class="title">Cat Nip</h1>
					<span class="ver">v0.0.1</span>
					<button class="btn collapse-btn" id="toggleBtn" title="Collapse"></button>
				</header>
				<div class="body">
					<div class="meter">
						<div class="bar" id="meterBar"></div>
					</div>

					<!-- Pack library section -->
					<div class="pack-section">
						<div class="pack-header">
							<span class="label">packs</span>
							<div class="pack-actions">
								<button class="btn" id="nextBtn" title="Next pack">&#x23ED;</button>
								<button class="btn" id="browseBtn" title="Browse registry">&#x1F50D;</button>
								<button class="btn" id="importBtn" title="Import .viz pack">+</button>
							</div>
						</div>
						<div class="pack-search-row" id="packSearchRow" hidden>
							<input type="text" id="packSearch" class="pack-search" placeholder="Search packs..." autocomplete="off" spellcheck="false" />
						</div>
						<div class="pack-list" id="packList"></div>
					</div>

					<div class="row auto-row">
						<span class="label">auto</span>
						<label class="check-inline">
							<input type="checkbox" id="autoChk" />
							<span>every</span>
						</label>
						<input type="number" id="autoSec" class="num" min="5" max="600" step="5" value="30" />
						<span class="value muted">s</span>
						<label class="check-inline">
							<input type="checkbox" id="shuffleChk" />
							<span>shuffle</span>
						</label>
					</div>
					<div class="row">
						<span class="label">audio</span>
						<select id="audioSourceSelect" class="select select-sm" title="Audio source">
							<option value="system">system</option>
							<option value="mic">mic</option>
						</select>
						<span class="value muted" id="audioStatus">capture not implemented yet</span>
						<button class="btn" id="permFixBtn" title="Open Screen Recording settings" hidden>fix</button>
					</div>
					<div class="row">
						<span class="label">quality</span>
						<select id="renderScaleSelect" class="select select-sm" title="Render resolution scale">
							<option value="1">full</option>
							<option value="0.75">high</option>
							<option value="0.5">medium</option>
							<option value="0.35">low</option>
						</select>
					</div>
					<div id="emptyState" class="empty-state" hidden>
						<p class="empty-heading">No visualizer packs installed</p>
						<p class="empty-body">Discover community packs</p>
						<button class="empty-browse-btn" id="emptyBrowseBtn">Browse Packs</button>
						<p class="empty-hint">or drag-and-drop a .viz file here</p>
					</div>
					<section id="paramsPanel" class="params-panel" hidden></section>
					<div id="errorBanner" class="error-banner" hidden></div>
					<div id="toast" class="toast" hidden></div>
				</div>
			</aside>

			<!-- Browse overlay (full-screen pack discovery) -->
			<div id="browseOverlay" class="browse-overlay" hidden>
				<div class="browse-panel">
					<!-- Header bar -->
					<header class="browse-header">
						<h2 class="browse-title">Browse Packs</h2>
						<div class="browse-header-actions">
							<input type="text" id="browseSearch" class="browse-search" placeholder="Search packs..." autocomplete="off" spellcheck="false" />
							<select id="browseSort" class="select select-sm browse-sort">
								<option value="newest">Newest</option>
								<option value="stars">Most Starred</option>
								<option value="installs">Most Installed</option>
							</select>
							<button class="btn browse-close-btn" id="browseCloseBtn" title="Close">&times;</button>
						</div>
					</header>

					<!-- Tag filter bar -->
					<div class="browse-tags" id="browseTags"></div>

					<!-- Content area: grid / detail / author views are rendered here -->
					<div class="browse-content" id="browseContent">
						<div class="browse-loading" id="browseLoading">Loading...</div>
						<div class="browse-grid" id="browseGrid"></div>
						<div class="browse-detail" id="browseDetail" hidden></div>
						<div class="browse-author" id="browseAuthor" hidden></div>
						<div class="browse-empty" id="browseEmpty" hidden>No packs found</div>
					</div>

					<!-- Pagination -->
					<div class="browse-pagination" id="browsePagination" hidden>
						<button class="btn browse-page-btn" id="browsePrev" disabled>Prev</button>
						<span class="browse-page-info" id="browsePageInfo">Page 1</span>
						<button class="btn browse-page-btn" id="browseNext">Next</button>
					</div>
				</div>
			</div>

			<!-- Context menu (positioned absolutely via JS) -->
			<div id="contextMenu" class="context-menu" hidden>
				<button class="context-item" data-action="favorite"><span class="context-icon">&#x2606;</span> Favorite</button>
				<button class="context-item" data-action="resetParams"><span class="context-icon">&#x21BA;</span> Reset Parameters</button>
				<button class="context-item" data-action="export"><span class="context-icon">&#x2913;</span> Export .viz</button>
				<button class="context-item" data-action="reveal"><span class="context-icon">&#x1F4C2;</span> Reveal in Finder</button>
				<div class="context-divider"></div>
				<button class="context-item context-item--danger" data-action="remove"><span class="context-icon">&#x2715;</span> Remove Pack</button>
			</div>

			<!-- Confirm dialog overlay -->
			<div id="confirmOverlay" class="confirm-overlay" hidden>
				<div class="confirm-dialog">
					<p class="confirm-msg" id="confirmMsg">Are you sure?</p>
					<div class="confirm-actions">
						<button class="confirm-btn confirm-btn--cancel" id="confirmCancel">Cancel</button>
						<button class="confirm-btn confirm-btn--danger" id="confirmOk">Remove</button>
					</div>
				</div>
			</div>
		</div>
		<script type="module" src="views://mainview/index.js"></script>
	</body>
</html>
